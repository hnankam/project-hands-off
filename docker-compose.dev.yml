# =============================================================================
# Development Docker Compose Override
# =============================================================================
#
# This file provides development-specific overrides for docker-compose.yml
# Includes local PostgreSQL and Redis containers for development.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (Local Development Only)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: copilotkit-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-copilotkit}
      POSTGRES_USER: ${DB_USERNAME:-copilotkit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-copilotkit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - copilotkit-network

  # ---------------------------------------------------------------------------
  # Redis Cache (Local Development Only)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: copilotkit-redis-dev
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - copilotkit-network
  # ---------------------------------------------------------------------------
  # Python Service - Development Configuration
  # ---------------------------------------------------------------------------
  copilotkit-pydantic:
    build:
      context: ./copilotkit-pydantic
      dockerfile: Dockerfile
      target: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEBUG: true
      PYTHON_ENV: development
      LOG_FORMAT: plain
      LOGFIRE_ENABLED: false
      # Local database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-copilotkit}
      DB_USERNAME: ${DB_USERNAME:-copilotkit}
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      DB_OTHER_PARAMS: sslmode=disable
      # Local Redis
      REDIS_ENABLED: true
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      REDIS_SSL: false
    volumes:
      # Mount source code for hot reload
      - ./copilotkit-pydantic:/app
      # Exclude Python cache
      - /app/__pycache__
      - /app/**/__pycache__
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--log-level", "debug"]

  # ---------------------------------------------------------------------------
  # Node.js Service - Development Configuration
  # ---------------------------------------------------------------------------
  copilot-runtime-server:
    build:
      context: ./copilot-runtime-server
      dockerfile: Dockerfile
      target: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      copilotkit-pydantic:
        condition: service_healthy
    environment:
      NODE_ENV: development
      # Local database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-copilotkit}
      DB_USERNAME: ${DB_USERNAME:-copilotkit}
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      DB_OTHER_PARAMS: sslmode=disable
      # Local Redis
      REDIS_ENABLED: true
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      REDIS_PASSWORD: ""
    volumes:
      # Mount source code for hot reload
      - ./copilot-runtime-server:/app
      # Exclude node_modules
      - /app/node_modules
    command: ["npm", "run", "dev"]

# =============================================================================
# Volumes (Development Only)
# =============================================================================
volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

# =============================================================================
# Development Notes
# =============================================================================
#
# - Local PostgreSQL and Redis containers for development
# - Hot reload enabled for both services
# - Debug logging enabled
# - Ports exposed for direct access
# - Source code mounted as volumes
# - Simple passwords for local development only
#
# =============================================================================
