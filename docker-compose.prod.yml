# =============================================================================
# Production Docker Compose Override
# =============================================================================
#
# This file provides production-specific overrides for docker-compose.yml
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Python Service - Production Configuration
  # ---------------------------------------------------------------------------
  copilotkit-pydantic:
    environment:
      DEBUG: false
      PYTHON_ENV: production
      LOG_FORMAT: json
      LOGFIRE_ENABLED: ${LOGFIRE_ENABLED:-true}
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
    # Remove port mapping in production (use reverse proxy)
    ports: []
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Node.js Service - Production Configuration
  # ---------------------------------------------------------------------------
  copilot-runtime-server:
    environment:
      NODE_ENV: production
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
    # Remove port mapping in production (use reverse proxy)
    ports: []
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (Production Only)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: copilotkit-nginx
    restart: unless-stopped
    depends_on:
      - copilotkit-pydantic
      - copilot-runtime-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - copilotkit-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

# =============================================================================
# Production Notes
# =============================================================================
#
# Required Managed Services:
# 1. PostgreSQL: Use Neon, AWS RDS, Google Cloud SQL, or Azure Database
#    - Configure connection pooling
#    - Enable automated backups
#    - Use read replicas for scaling
#
# 2. Redis: Use Redis Cloud, AWS ElastiCache, Google Memorystore, or Azure Cache
#    - Enable persistence (RDB/AOF)
#    - Configure high availability
#    - Use separate instances for Python (DB 0) and Node.js (DB 1) services
#
# Additional Production Requirements:
# 3. Secrets: Use Docker secrets or external secret management (Vault, AWS Secrets Manager)
# 4. Load Balancing: Use cloud load balancers or Kubernetes ingress
# 5. Monitoring: Integrate with Prometheus, Grafana, Logfire, or cloud monitoring
# 6. SSL/TLS: Configure SSL certificates (Let's Encrypt, AWS ACM)
# 7. Networking: Use private networks and security groups
# 8. Scaling: Use Docker Swarm or Kubernetes for orchestration
# 9. CI/CD: Integrate with GitHub Actions, GitLab CI, or Jenkins
# 10. DNS: Configure domain names and SSL for all services
#
# =============================================================================
