<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept Organization Invitation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      color: #1a202c;
      font-size: 28px;
      margin-bottom: 16px;
    }

    p {
      color: #4a5568;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .button {
      display: inline-block;
      padding: 14px 32px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      margin: 8px;
    }

    .button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    .button-secondary {
      background: #e2e8f0;
      color: #4a5568;
    }

    .button-secondary:hover {
      background: #cbd5e0;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .invitation-details {
      background: #f7fafc;
      border-radius: 8px;
      padding: 20px;
      margin: 24px 0;
      text-align: left;
    }

    .invitation-details h2 {
      color: #2d3748;
      font-size: 20px;
      margin-bottom: 12px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #718096;
      font-weight: 500;
    }

    .detail-value {
      color: #2d3748;
      font-weight: 600;
    }

    .error {
      background: #fed7d7;
      color: #c53030;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
    }

    .success {
      background: #c6f6d5;
      color: #22543d;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
    }

    .small {
      font-size: 14px;
      color: #718096;
      margin-top: 16px;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="app">
      <div class="spinner"></div>
      <h1>Loading Invitation...</h1>
      <p>Please wait while we check your invitation.</p>
    </div>
  </div>

  <script>
    // ========================================
    // CONFIGURATION - Update these values!
    // ========================================
    const CONFIG = {
      // Your Chrome extension ID (from Chrome Web Store or developer mode)
      EXTENSION_ID: 'YOUR_EXTENSION_ID_HERE',
      
      // Your Chrome Web Store URL
      WEBSTORE_URL: 'https://chrome.google.com/webstore/detail/YOUR_EXTENSION_ID',
      
      // Your backend API URL
      API_URL: 'http://localhost:3001',
      
      // Your app name
      APP_NAME: 'Your App'
    };

    // Get invitation ID from URL
    const urlParts = window.location.pathname.split('/');
    const invitationId = urlParts[urlParts.length - 1];

    let invitationData = null;

    // Main flow
    (async function() {
      try {
        // Step 1: Load invitation details from API
        await loadInvitationDetails();

        // Step 2: Check if extension is installed
        const extensionInstalled = await checkExtensionInstalled();

        if (extensionInstalled) {
          showExtensionInstalled();
        } else {
          showInstallPrompt();
        }
      } catch (error) {
        showError(error.message || 'Failed to load invitation');
      }
    })();

    // Load invitation details from backend
    async function loadInvitationDetails() {
      const response = await fetch(`${CONFIG.API_URL}/api/invitations/${invitationId}`);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Failed to load invitation');
      }

      invitationData = data.invitation;
    }

    // Check if extension is installed
    function checkExtensionInstalled() {
      return new Promise((resolve) => {
        if (!window.chrome?.runtime) {
          resolve(false);
          return;
        }

        try {
          chrome.runtime.sendMessage(
            CONFIG.EXTENSION_ID,
            { type: 'CHECK_INSTALLED' },
            (response) => {
              resolve(response && response.installed);
            }
          );
        } catch {
          resolve(false);
        }

        // Timeout after 1 second
        setTimeout(() => resolve(false), 1000);
      });
    }

    // Show UI when extension is installed
    function showExtensionInstalled() {
      document.getElementById('app').innerHTML = `
        <div class="icon">✅</div>
        <h1>Invitation Found!</h1>
        
        <div class="invitation-details">
          <h2>Invitation Details</h2>
          <div class="detail-row">
            <span class="detail-label">Organization:</span>
            <span class="detail-value">${invitationData.organization.name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Role:</span>
            <span class="detail-value">${invitationData.role}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Invited by:</span>
            <span class="detail-value">${invitationData.inviter.name || invitationData.inviter.email}</span>
          </div>
        </div>

        <p>Click below to open the extension and accept your invitation.</p>
        
        <button class="button" onclick="openExtension()">
          Open ${CONFIG.APP_NAME}
        </button>

        <p class="small">The extension will open automatically in 3 seconds...</p>
      `;

      // Auto-open extension after 3 seconds
      setTimeout(openExtension, 3000);
    }

    // Show install prompt when extension is not installed
    function showInstallPrompt() {
      document.getElementById('app').innerHTML = `
        <div class="icon">📦</div>
        <h1>Install Extension Required</h1>
        
        <div class="invitation-details">
          <h2>Invitation Details</h2>
          <div class="detail-row">
            <span class="detail-label">Organization:</span>
            <span class="detail-value">${invitationData.organization.name}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Role:</span>
            <span class="detail-value">${invitationData.role}</span>
          </div>
        </div>

        <p>To accept this invitation, you need to install the ${CONFIG.APP_NAME} extension first.</p>
        
        <a href="${CONFIG.WEBSTORE_URL}" class="button" target="_blank">
          Install Extension
        </a>

        <p class="small">
          After installing the extension, return to this page or log in to the extension.
          Your invitation will be waiting for you!
        </p>
      `;

      // Store invitation ID for after install
      localStorage.setItem('pendingInvitation', invitationId);
    }

    // Open extension
    function openExtension() {
      const extensionUrl = `chrome-extension://${CONFIG.EXTENSION_ID}/index.html#/accept-invitation/${invitationId}`;
      
      // Try to open in current tab
      window.location.href = extensionUrl;

      // Fallback: Show success message after 2 seconds if still on page
      setTimeout(() => {
        document.getElementById('app').innerHTML = `
          <div class="icon">🎉</div>
          <h1>Opening Extension...</h1>
          <p>If the extension didn't open automatically, click below:</p>
          <a href="${extensionUrl}" class="button">
            Open Extension Manually
          </a>
          <p class="small">
            Make sure you have the extension installed and enabled.
          </p>
        `;
      }, 2000);
    }

    // Show error message
    function showError(message) {
      document.getElementById('app').innerHTML = `
        <div class="icon">❌</div>
        <h1>Error</h1>
        <div class="error">
          ${message}
        </div>
        <p>This invitation may have expired or been used already.</p>
        <a href="${CONFIG.WEBSTORE_URL}" class="button-secondary button">
          Return to ${CONFIG.APP_NAME}
        </a>
      `;
    }

    // Check for pending invitation from localStorage when page loads
    window.addEventListener('load', () => {
      const pendingInvitation = localStorage.getItem('pendingInvitation');
      if (pendingInvitation && pendingInvitation !== invitationId) {
        // User just installed extension and returned
        // Could show a message or auto-redirect to the stored invitation
      }
    });
  </script>
</body>
</html>
