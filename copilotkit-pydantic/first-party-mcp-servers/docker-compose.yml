      - PORT=8103
      - MCP_SERVER_NAME=confluence
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_OTHER_PARAMS=${DB_OTHER_PARAMS:-sslmode=require}
      - ENCRYPTION_MASTER_SECRET=${ENCRYPTION_MASTER_SECRET}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - LOGFIRE_ENABLED=${LOGFIRE_ENABLED:-false}
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Databricks MCP Server
  # ---------------------------------------------------------------------------
  databricks-mcp:
    build:
      context: .
      dockerfile: databricks/Dockerfile
      target: development
    container_name: databricks-mcp
    restart: unless-stopped
    ports:
      - "8104:8104"
    environment:
      - PORT=8104
      - MCP_SERVER_NAME=databricks
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_OTHER_PARAMS=${DB_OTHER_PARAMS:-sslmode=require}
      - ENCRYPTION_MASTER_SECRET=${ENCRYPTION_MASTER_SECRET}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - LOGFIRE_ENABLED=${LOGFIRE_ENABLED:-false}
    networks:
