      retries: 3
      start_period: 40s

# =============================================================================
# Volumes
# =============================================================================
# No persistent volumes needed for stateless MCP servers

# =============================================================================
# Configuration Notes
# =============================================================================
#
# Environment Variables:
#   Required:
#     - DB_HOST, DB_DATABASE, DB_USERNAME, DB_PASSWORD
#     - ENCRYPTION_MASTER_SECRET
#   Optional:
#     - LOGFIRE_TOKEN, LOGFIRE_ENABLED
#     - DB_OTHER_PARAMS
#
# Health Checks:
#   - Each server has a basic Python health check
#   - Interval: 30 seconds
#   - Timeout: 10 seconds
#   - Retries: 3
#
# Networking:
#   - All servers on shared 'mcp-network'
#   - Can communicate internally
#   - Exposed ports for external access
#
# =============================================================================
