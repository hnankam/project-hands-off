<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Side Panel</title>
  </head>

  <body>
    <div id="app-container">
      <!-- Skeleton loading state - will be replaced by React app -->
      <div class="skeleton-container">
        <!-- Header skeleton -->
        <div class="skeleton-header">
          <div class="skeleton-title"></div>
          <div class="skeleton-actions">
            <div class="skeleton-button"></div>
            <div class="skeleton-button"></div>
            <div class="skeleton-button"></div>
          </div>
        </div>
        
        <!-- Chat area skeleton -->
        <div class="skeleton-chat">
          <div class="skeleton-message">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-content">
              <div class="skeleton-line"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>
          <div class="skeleton-message">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-content">
              <div class="skeleton-line"></div>
              <div class="skeleton-line"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>
          <div class="skeleton-message">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-content">
              <div class="skeleton-line"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>
        </div>
        
        <!-- Input area skeleton -->
        <div class="skeleton-input">
          <div class="skeleton-input-field"></div>
          <div class="skeleton-send-button"></div>
        </div>
        
        <!-- Session tabs skeleton -->
        <div class="skeleton-tabs">
          <div class="skeleton-tab"></div>
          <div class="skeleton-tab"></div>
          <div class="skeleton-tab"></div>
        </div>
      </div>
      
      <style>
        .skeleton-container {
          height: 100vh;
          background-color: #f9fafb;
          display: flex;
          flex-direction: column;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .skeleton-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 12px 16px;
          border-bottom: 1px solid #e5e7eb;
        }
        
        .skeleton-title {
          width: 120px;
          height: 20px;
          background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 4px;
        }
        
        .skeleton-actions {
          display: flex;
          gap: 8px;
        }
        
        .skeleton-button {
          width: 32px;
          height: 32px;
          background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 6px;
        }
        
        .skeleton-chat {
          flex: 1;
          padding: 16px;
          display: flex;
          flex-direction: column;
          gap: 16px;
        }
        
        .skeleton-message {
          display: flex;
          gap: 12px;
          align-items: flex-start;
        }
        
        .skeleton-avatar {
          width: 32px;
          height: 32px;
          background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 50%;
          flex-shrink: 0;
        }
        
        .skeleton-content {
          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 8px;
        }
        
        .skeleton-line {
          height: 16px;
          background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 4px;
        }
        
        .skeleton-line.short {
          width: 60%;
        }
        
        .skeleton-input {
          padding: 16px;
          border-top: 1px solid #e5e7eb;
          display: flex;
          gap: 12px;
          align-items: center;
        }
        
        .skeleton-input-field {
          flex: 1;
          height: 40px;
          background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 20px;
        }
        
        .skeleton-send-button {
          width: 40px;
          height: 40px;
          background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 50%;
        }
        
        .skeleton-tabs {
          padding: 8px 16px;
          border-top: 1px solid #e5e7eb;
          display: flex;
          gap: 8px;
        }
        
        .skeleton-tab {
          width: 80px;
          height: 28px;
          background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
          background-size: 200% 100%;
          animation: shimmer 1.5s infinite;
          border-radius: 14px;
        }
        
        @keyframes shimmer {
          0% {
            background-position: -200% 0;
          }
          100% {
            background-position: 200% 0;
          }
        }
        
        /* Dark theme skeleton */
        @media (prefers-color-scheme: dark) {
          .skeleton-container {
            background-color: #111827 !important;
          }
          
          .skeleton-header {
            border-bottom-color: #374151 !important;
          }
          
          .skeleton-title,
          .skeleton-button,
          .skeleton-avatar,
          .skeleton-line,
          .skeleton-input-field,
          .skeleton-send-button,
          .skeleton-tab {
            background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%) !important;
            background-size: 200% 100% !important;
          }
          
          .skeleton-input {
            border-top-color: #374151 !important;
          }
          
          .skeleton-tabs {
            border-top-color: #374151 !important;
          }
        }
      </style>
    </div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
